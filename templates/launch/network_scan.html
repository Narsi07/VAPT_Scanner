{% extends 'dashboard/base.html' %}
{% load static %}
{% block body %}

<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-body">
                <div class="d-md-flex align-items-center">
                    <h1 class="card-title"><i class="fas fa-network-wired mr-2"></i> Network Scan</h1>
                </div>
                <br>
                <div class="row">
                    <div class="col-md-6">
                        <div class="card">
                            <form id="start_scan" class="form-horizontal">{% csrf_token %}
                                <div class="card-body">
                                    <h4 class="card-title"></h4>
                                    <div class="form-group row">
                                        <label class="col-sm-3 text-right control-label col-form-label">Target
                                            IP(s)</label>
                                        <div class="col-sm-9">
                                            <textarea class="form-control" type="text" name="ip_address" id="ip_address"
                                                placeholder="192.168.1.1,192.168.1.0/24,example.com"></textarea>
                                        </div>
                                    </div>
                                </div>
                                <div class="card">
                                    <div class="card-body">
                                        <div class="form-group row">
                                            <label
                                                class="col-sm-3 text-right control-label col-form-label">Projects</label>
                                            <div class="col-md-9">
                                                <select id="project_id" name="project_id"
                                                    class="select2 form-control custom-select"
                                                    style="width: 100%; height:36px;">
                                                    {% for data in all_projects %}
                                                    <option value="{{ data.uu_id }}">{{ data.project_name }}</option>
                                                    {% endfor %}
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="card-body">
                                        <div class="controls">
                                            <input type="submit" class="btn btn-primary" value="Launch">
                                        </div>
                                        <div id='status'></div>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="d-md-flex align-items-center">
                    <h5 class="card-title">Scanners</h5>
                </div>
                <br>
                <p>Select your scanner(s) from the ones available:</p>
                <div class="custom-control custom-control-inline">
                    <div class="checkbox inline checkbox-slider--b-flat checkbox-slider--b" style="width: 200px;">
                        <label>
                            <input name="opt_nmap" type="checkbox"><span>Nmap Port Scan</span>
                        </label>
                    </div>
                    <div class="checkbox inline checkbox-slider--b-flat checkbox-slider--b" style="width: 200px;">
                        <label>
                            <input name="opt_vulners" type="checkbox"><span>Nmap + Vulners</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-select/1.12.4/js/bootstrap-select.min.js"></script>

<script type="text/javascript">
    $(document).on('submit', '#start_scan', function (e) {
        var opt = false;
        e.preventDefault();

        var ip = $('#ip_address').val();
        var project_id = $('#project_id').val();
        var csrf = $('input[name=csrfmiddlewaretoken]').val();

        // Loop through each IP if comma - separated, launch for each selected scanner
        var ips = ip.split(',').map(function (s) { return s.trim(); }).filter(Boolean);

        if ($('[name="opt_nmap"]').is(':checked')) {
            opt = true;
            ips.forEach(function (single_ip) {
                $.ajax({
                    type: 'POST',
                    url: '{% url "tools:nmap" %}',
                    data: {
                        ip: single_ip,
                        project_id: project_id,
                        csrfmiddlewaretoken: csrf
                    }
                });
            });
        }

        if ($('[name="opt_vulners"]').is(':checked')) {
            opt = true;
            ips.forEach(function (single_ip) {
                $.ajax({
                    type: 'POST',
                    url: '{% url "tools:nmap_vulners" %}',
                    data: {
                        ip: single_ip,
                        project_id: project_id,
                        csrfmiddlewaretoken: csrf
                    }
                });
            });
        }

        if (opt) {
            $('#status').text('Scan launched successfully. You can view progress in the Results Hub.').css({ 'color': '#5bb75b', 'margin-left': '200px' });
            // Clear input
            $('#ip_address').val('');
        } else {
            $('#status').text("The scan can't launch: no scanner selected.").css({ 'color': '#b94a48', 'margin-left': '200px' });
        }
    });
</script>

{% endblock %}
